name: Update README

on:
  workflow_dispatch:

    inputs:
      image_override:
        description: 'Override the image URL (eg https://flickr.com/photos/mendhak/55139090030)'  
        required: false
        default: ''    

jobs:
  build:
    permissions: 
      contents: write

    runs-on: ubuntu-latest
    steps:
      - id: get-flickr-image
        name: Get latest Flickr image from album
        run: |
            if [ -n "${{ inputs.image_override }}" ]; then
              # Extract photo ID (URL format: https://flickr.com/photos/mendhak/55139090030 or just ID: 55139090030)
              PHOTO_ID=$(echo "${{ inputs.image_override }}" | grep -oP '\d+$')
              PHOTO_INFO=$(curl -s "https://www.flickr.com/services/rest/?method=flickr.photos.getInfo&api_key=${{ secrets.FLICKR_API_KEY }}&photo_id=${PHOTO_ID}&format=json&nojsoncallback=1" | jq -r '.photo')
              echo LATEST_IMAGE_URL=$(echo $PHOTO_INFO | jq -r '"https://live.staticflickr.com/" + (.server|tostring) + "/" + .id + "_" + .secret + "_b.jpg"') >> $GITHUB_ENV
              echo "LATEST_IMAGE_ID=$(echo $PHOTO_INFO | jq -r '.id')" >> $GITHUB_ENV
            else
              # Get latest image from album
              LATEST_IMAGE_INFO=$(curl -s "https://www.flickr.com/services/rest/?method=flickr.photosets.getPhotos&api_key=${{ secrets.FLICKR_API_KEY }}&photoset_id=72157716222153076&format=json&per_page=1&nojsoncallback=1" | jq -r '.photoset.photo[-1]')
              echo LATEST_IMAGE_URL=$(echo $LATEST_IMAGE_INFO | jq -r '"https://live.staticflickr.com/" + .server + "/" + .id + "_" + .secret + "_b.jpg"') >> $GITHUB_ENV
              echo "LATEST_IMAGE_ID=$(echo $LATEST_IMAGE_INFO | jq -r '.id')" >> $GITHUB_ENV
            fi

      - uses: actions/checkout@v3
            
      - name: Overwrite README with latest image
        run: |
            echo "<a href=\"https://www.flickr.com/photos/mendhak/${{ env.LATEST_IMAGE_ID }}\"><img src=\"${{ env.LATEST_IMAGE_URL }}\" /></a>" > README.md
            cat README.md
      - name: Commit and push changes
        run: |
            git config --global user.name "mendhak"
            git config --global user.email "mendhak@users.noreply.github.com"
            git add README.md
            git commit -m "Update README with latest Flickr image" 
            git push
    


